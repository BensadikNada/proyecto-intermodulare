<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuccessFlow - Listar Comentarios</title>
    <link rel="icon" th:href="@{/images/lockup-light-background.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/ListarComentarios.css}">
    <script src="https://kit.fontawesome.com/563f11c9fb.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="side-bar">
        <div class="logo">
            <img th:src="@{/images/icon-color.png}" alt="icon color">
            <img th:src="@{/images/wordmark-black.png}" alt="word mark">
        </div>
        <nav>
            <a th:href="@{/dashboard}" class="dashboard-link">
                <i class="fa-solid fa-chart-simple"></i>
                Dashboard
            </a>
            <a th:href="@{/tarea/listar-todo}" class="dashboard-link">
                <i class="fa-regular fa-square-check"></i>
                Mis Tareas
            </a>
            <a th:href="@{/proyecto/listar-proyectos}" class="dashboard-link">
                <i class="fa-solid fa-folder-tree"></i>
                Proyectos
            </a>
            <a href="" class="dashboard-link">
                <i class="fa-regular fa-user"></i>
                Perfil
            </a>
        </nav>
        <div class="footer-nav">
            <div class="usuario">
                <p th:text="${firstLetter}"></p>
                <div class="details">
                    <p th:text="${usuario.username}"></p>
                    <p th:text="${usuario.correo}"></p>
                </div>
            </div>
            <form th:action="@{/logout}" method="post">
                <div class="logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <button type="submit">Logout</button>
                </div>
            </form>
        </div>
    </div>
    <div class="content">
        <h1>Comentarios</h1>
        <div class="comentarios">
            <div th:if="${#lists.isEmpty(tickets)}" class="comentario-empoty">
                <i class="fa-regular fa-comment"></i>
                <h3>No hay comentarios disponibles.</h3>
                <p>Empieza por crear un comentario.</p>
                <a th:href="@{/comentario/crear-comentario/{tareaId}(tareaId=${tareaId})}" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Crea Comentario
                </a>
            </div>
            <div th:if="${!#lists.isEmpty(tickets)}" class="comentario-not-empoty">
                <div class="comentario-item" th:each="t : ${tickets}">
                    <div class="header-comentario">
                        <p th:text="${t.usuario.username}"></p>
                        <p th:text="${#temporals.format(t.fecha_creacion, 'dd MMMM')}"></p>
                    </div>
                    <div class="body-comentario">
                        <div class="details-comments">
                            <h3 th:text="${t.titulo}"></h3>
                            <p th:text="${t.descripcion}"></p>
                        </div>
                        <div class="comentario-actions" th:if="${t.usuario.id_usuario == usuario.id_usuario}">

                            <!-- EDIT -->
                            <a th:href="@{/comentario/editar-comentario/{id_ticket}/{tareaId}
                    (id_ticket=${t.id_ticket}, tareaId=${t.tarea.id_tarea})}">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </a>

                            <!-- DELETE -->
                            <form th:action="@{/comentario/eliminar-comentario/{id_ticket}/{tareaId}
                         (id_ticket=${t.id_ticket}, tareaId=${t.tarea.id_tarea})}" method="post">

                                <button type="submit">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
