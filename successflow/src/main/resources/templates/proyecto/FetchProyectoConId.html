<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuccessFlow - Proyecto Elegido</title>
    <link rel="icon" th:href="@{/images/lockup-light-background.png}" type="image/png">
    <script src="https://kit.fontawesome.com/563f11c9fb.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/FetchProyectoConId.css}">
</head>

<body>
    <div class="side-bar">
        <div class="logo">
            <img th:src="@{/images/icon-color.png}" alt="icon color">
            <img th:src="@{/images/wordmark-black.png}" alt="word mark">
        </div>
        <nav>
            <a th:href="@{/dashboard}" class="dashboard-link">
                <i class="fa-solid fa-chart-simple"></i>
                Dashboard
            </a>
            <a th:href="@{/tarea/listar-todo}" class="dashboard-link">
                <i class="fa-regular fa-square-check"></i>
                Mis Tareas
            </a>
            <a th:href="@{/proyecto/listar-proyectos}" class="dashboard-link-is-active">
                <i class="fa-solid fa-folder-tree"></i>
                Proyectos
            </a>
            <a href="" class="dashboard-link">
                <i class="fa-regular fa-circle-check"></i>
                Tareas Completas
            </a>
            <a href="" class="dashboard-link">
                <i class="fa-regular fa-user"></i>
                Perfil
            </a>
        </nav>
        <div class="footer-nav">
            <div class="usuario">
                <p th:text="${firstLetter}"></p>
                <div class="details">
                    <p th:text="${usuario.username}"></p>
                    <p th:text="${usuario.correo}"></p>
                </div>
            </div>
            <form th:action="@{/logout}" method="post">
                <div class="logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <button type="submit">Logout</button>
                </div>
            </form>
        </div>
    </div>
    <div class="content">
        <a href=""><i class="fa-solid fa-arrow-left"></i> Volver al Proyecto</a>
        <div class="header-project">
            <div class="details-project">
                <i class="fa-solid fa-hashtag"></i>
                <div>
                    <h3 th:text="${p.titulo}"></h3>
                </div>
            </div>
        </div>
        <div class="body-project">

        </div>
    </div>
</body>

</html>
